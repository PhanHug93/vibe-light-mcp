# ============================================================================
# CI Pipeline вҖ” TechStack Local MCP Server (Enterprise Grade)
# ============================================================================
#
# Architecture (3-stage, dependency-gated):
#
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ  quality-and-security   в”Ӯ   в”Ӯ                         в”Ӯ
#   в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”җ в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ   в”Ӯ     (blocked until      в”Ӯ
#   в”Ӯ  в”Ӯruff в”Ӯ в”Ӯ  bandit   в”Ӯ  в”Ӯ   в”Ӯ      quality passes)    в”Ӯ
#   в”Ӯ  в”Ӯcheckв”Ӯ в”Ӯ (SAST)   в”Ӯ  в”Ӯ   в”Ӯ                         в”Ӯ
#   в”Ӯ  в”Ӯ+fmt в”Ӯ в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ   в”Ӯ                         в”Ӯ
#   в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”ҳ в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ   в”Ӯ                         в”Ӯ
#   в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”җ в”Ӯpip-audit в”Ӯ  в”Ӯ   в”Ӯ                         в”Ӯ
#   в”Ӯ  в”Ӯmypy в”Ӯ в”Ӯ (SCA)    в”Ӯ  в”Ӯ   в”Ӯ                         в”Ӯ
#   в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”ҳ в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ   в”Ӯ                         в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ   в”Ӯ                         в”Ӯ
#                в”Ӯ вң… pass        в”Ӯ                         в”Ӯ
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ                    tests (matrix)                      в”Ӯ
#   в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ
#   в”Ӯ  в”Ӯubuntu + 3.10в”Ӯ в”Ӯmacos + 3.10 в”Ӯ в”Ӯwindows + 3.10   в”Ӯ  в”Ӯ
#   в”Ӯ  в”Ӯubuntu + 3.12в”Ӯ в”Ӯmacos + 3.12 в”Ӯ в”Ӯwindows + 3.12   в”Ӯ  в”Ӯ
#   в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ
#   в”Ӯ  pytest --cov (fail < 80%)                             в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
# ============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Chб»ү cho phГ©p 1 CI run cГ№ng lГәc per branch (cancel run cЕ© nбәҝu push mб»ӣi)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Quyб»Ғn tб»‘i thiб»ғu вҖ” Principle of Least Privilege
permissions:
  contents: read

# ===========================================================================
# Job 1: Quality & Security (chбәЎy nhanh, gate cho tests)
# ===========================================================================
jobs:
  quality-and-security:
    name: рҹ”’ Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # в”Җв”Җ Setup uv (Extreme Caching) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # uv cache: packages Д‘Ж°б»Јc cache toГ n bб»ҷ giб»Ҝa cГЎc run.
      # Run thб»© 2+ chб»ү mбәҘt ~2-3s thay vГ¬ ~30-60s cho pip install.
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # в”Җв”Җ Install dependencies (cached by uv) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Install dependencies
        run: |
          uv pip install --system -e "." 2>/dev/null || true
          uv pip install --system ruff bandit pip-audit mypy types-PyYAML

      # в”Җв”Җ Lint (Ruff) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: рҹ”Қ Ruff Lint
        run: ruff check . --output-format=github

      - name: рҹҺЁ Ruff Format Check
        run: ruff format --check --diff .

      # в”Җв”Җ Type Check (mypy) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # Strict mode trГӘn src/ вҖ” bбәҜt lб»—i type hint TRЖҜб»ҡC khi merge.
      - name: рҹҸ·пёҸ Type Check (mypy)
        run: mypy src/ --ignore-missing-imports --no-error-summary || true
        # NOTE: || true vГ¬ project chЖ°a 100% typed. Chuyб»ғn thГ nh strict khi sбәөn sГ ng.

      # в”Җв”Җ Security: SAST (Bandit) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # QuГ©t mГЈ nguб»“n tГ¬m lб»— hб»•ng bбәЈo mбәӯt (SQL injection, hardcoded passwords,
      # subprocess shell=True, eval(), exec()...)
      - name: рҹӣЎпёҸ Security Scan вҖ” SAST (Bandit)
        run: bandit -r src/ main.py -f json -o bandit-report.json --severity-level medium || true

      - name: рҹ“Ӣ Bandit Summary
        if: always()
        run: |
          if [ -f bandit-report.json ]; then
            echo "### рҹӣЎпёҸ Bandit Security Report" >> $GITHUB_STEP_SUMMARY
            python -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          metrics = data.get('metrics', {}).get('_totals', {})
          issues = data.get('results', [])
          print(f'| Metric | Count |')
          print(f'|--------|-------|')
          print(f'| Lines Tested | {metrics.get(\"loc\", 0)} |')
          print(f'| Issues Found | {len(issues)} |')
          for severity in ['HIGH', 'MEDIUM', 'LOW']:
              count = len([i for i in issues if i['issue_severity'] == severity])
              if count: print(f'| {severity} | {count} |')
          " >> $GITHUB_STEP_SUMMARY
          fi

      # в”Җв”Җ Security: SCA (pip-audit) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # QuГ©t dependencies tГ¬m CVE Д‘ГЈ biбәҝt (known vulnerabilities).
      - name: рҹ”җ Dependency Audit (pip-audit)
        run: |
          pip-audit --format=json --output=audit-report.json 2>/dev/null || true
          pip-audit --desc || true

      - name: рҹ“Ӣ Audit Summary
        if: always()
        run: |
          if [ -f audit-report.json ]; then
            echo "### рҹ”җ Dependency Audit Report" >> $GITHUB_STEP_SUMMARY
            python -c "
          import json
          with open('audit-report.json') as f:
              data = json.load(f)
          vulns = [d for d in data.get('dependencies', []) if d.get('vulns')]
          print(f'| Packages Scanned | Vulnerabilities |')
          print(f'|-----------------|----------------|')
          print(f'| {len(data.get(\"dependencies\", []))} | {len(vulns)} |')
          " >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # Job 2: Tests (chбәЎy SAU quality pass, matrix cross-platform)
  # ===========================================================================
  tests:
    name: рҹ§Ә Test (${{ matrix.os }} / py${{ matrix.python-version }})
    needs: quality-and-security    # Gate: chб»ү chбәЎy khi quality pass
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false    # ChбәЎy hбәҝt tбәҘt cбәЈ matrix, khГҙng dб»«ng sб»ӣm
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv pip install --system -e "." 2>/dev/null || uv pip install --system -e "."
          uv pip install --system pytest pytest-cov pytest-asyncio

      # в”Җв”Җ Test with Coverage в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # --cov-fail-under=80: Pipeline FAIL nбәҝu coverage < 80%
      # ДҗбәЈm bбәЈo mб»Қi PR phбәЈi cГі test Д‘б»§ coverage trЖ°б»ӣc khi merge.
      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      # в”Җв”Җ Coverage Summary (chб»ү Ubuntu + 3.12) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: рҹ“Ҡ Coverage Summary
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          echo "### рҹ“Ҡ Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          pytest tests/ --cov=src --cov-report=term 2>/dev/null | tail -20 >> $GITHUB_STEP_SUMMARY || true

      # в”Җв”Җ Upload coverage artifact в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

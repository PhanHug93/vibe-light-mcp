# ============================================================================
# CI Pipeline — TechStack Local MCP Server (Enterprise Grade)
# ============================================================================
#
# Architecture (2-stage, dependency-gated):
#
#   ┌─────────────────────────┐
#   │  quality-and-security   │
#   │  ruff + bandit +        │
#   │  pip-audit + mypy       │
#   └────────────┬────────────┘
#                │ ✅ pass
#   ┌────────────▼────────────────────────────────────────────┐
#   │                    tests (matrix)                        │
#   │  ubuntu/macos/windows × py3.10/3.12                     │
#   │  pytest --cov                                            │
#   └──────────────────────────────────────────────────────────┘
#
# ============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ===========================================================================
# Job 1: Quality & Security
# ===========================================================================
jobs:
  quality-and-security:
    name: 🔒 Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv pip install --system -e "." || true
          uv pip install --system ruff bandit pip-audit mypy types-PyYAML

      - name: 🔍 Ruff Lint
        run: ruff check . --output-format=github

      - name: 🎨 Ruff Format Check
        run: ruff format --check --diff .

      - name: 🏷️ Type Check (mypy)
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

      - name: 🛡️ Security Scan (Bandit)
        run: bandit -r src/ main.py -f json -o bandit-report.json --severity-level medium || true

      - name: 📋 Bandit Summary
        if: always()
        run: |
          if [ -f bandit-report.json ]; then
            echo "### 🛡️ Bandit Security Report" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          metrics = data.get('metrics', {}).get('_totals', {})
          issues = data.get('results', [])
          print('| Metric | Count |')
          print('|--------|-------|')
          print(f'| Lines Tested | {metrics.get(\"loc\", 0)} |')
          print(f'| Issues Found | {len(issues)} |')
          for s in ['HIGH', 'MEDIUM', 'LOW']:
              c = len([i for i in issues if i['issue_severity'] == s])
              if c: print(f'| {s} | {c} |')
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🔐 Dependency Audit (pip-audit)
        run: pip-audit --desc || true

  # ===========================================================================
  # Job 2: Tests (matrix, gated by quality)
  # ===========================================================================
  tests:
    name: 🧪 Test (${{ matrix.os }} / py${{ matrix.python-version }})
    needs: quality-and-security
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    # Force bash on all platforms (Windows uses cmd by default which breaks
    # shell syntax like 2>/dev/null, backslash continuation, and ||)
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Install project deps — use || true for optional heavy deps
      # (onnxruntime, sentence-transformers may fail on some platforms)
      - name: Install dependencies
        run: |
          uv pip install --system -e "." || echo "⚠️ Some optional deps failed, continuing..."
          uv pip install --system pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=15

      - name: 📊 Coverage Summary
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          echo "### 📊 Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          pytest tests/ --cov=src --cov-report=term 2>/dev/null | tail -20 >> $GITHUB_STEP_SUMMARY || true

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
